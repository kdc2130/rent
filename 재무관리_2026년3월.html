.sf-a{background:#dbeafe;color:#1e3a8a}
.sf-d{background:#fee2e2;color:#991b1b}
.sf-n{background:#dcfce7;color:#14532d}

function fmtN(v){if(v===null||v===undefined)return'—';const n=Math.round(Number(v));if(isNaN(n))return'—';return n.toLocaleString('ko-KR')}
function fmtB(v){if(!v)return'—';const n=Math.round(Number(v));return(n/1e8).toFixed(2)+'억'}
function fmtM(v){if(!v)return'—';const n=Math.round(Number(v));return(n/1e4).toFixed(0)+'만'}
function parseV(s){if(!s||s==='')return null;return parseInt(s.replace(/,/g,''),10)||0}
function dStr(c,p){if(c===null||p===null)return'—';const d=Math.round(c-p);return(d>0?'+':'')+d.toLocaleString('ko-KR')}
function dCls(c,p){if(c===null||p===null)return'z';return c>p?'p':c<p?'n':'z'}
function nCls(v){return v===null||v===0?'z':v<0?'r':''}
function iid(name,idx){return`inp-${name}-${idx}`}
function noteV(k){return(getNote(k)||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function fmtProj(el){const raw=el.value.replace(/[^\d]/g,'');if(!raw)return;el.value=parseInt(raw).toLocaleString('ko-KR')}
function parseProjVal(id){return parseV(document.getElementById(id).value)||0}

function dateToIdx(s){
  const m=s.replace('.','-');
  const i=DATES.indexOf(m);
  return i>=0?i:null;
}

let chartMain=null;

// 날짜 문자열(YYYY-MM 또는 YYYY.MM) → {year, month} 파싱
function parseYM(s){
  if(!s) return null;
  const t=s.trim().replace('.','-');
  const m4=t.match(/^(\d{4})$/);
  if(m4) return {year:parseInt(m4[1]),month:12};
  const m6=t.match(/^(\d{4})-(\d{2})$/);
  if(m6) return {year:parseInt(m6[1]),month:parseInt(m6[2])};
  return null;
}
function adjYear(delta){
  const el=document.getElementById('range-end-yr');
  el.value=Math.max(2024,Math.min(2070,parseInt(el.value||2026)+delta));
  updateMainChart();
}
// 두 날짜 사이 월 수
function monthsBetween(from,to){
  return (to.year-from.year)*12+(to.month-from.month);
}
// YYYY-MM 레이블 생성
function addMonths(base,n){
  const d=new Date(base.year, base.month-1+n, 1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

// Chart.js 수직선 플러그인 (현재 시점 표시)
const vertLinePlugin={
  id:'vertLine',
  afterDraw(chart){
    // chartMain(자산추이)에만 적용
    if(chart.canvas.id!=='chartMain') return;
    const {ctx,chartArea,scales}=chart;
    const nowLabel='2026-02';
    const idx=chart.data.labels.indexOf(nowLabel);
    if(idx<0) return;
    const x=scales.x.getPixelForValue(idx);
    const {top,bottom}=chartArea;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(x,top); ctx.lineTo(x,bottom);
    ctx.strokeStyle='rgba(220,38,38,.75)';
    ctx.lineWidth=2;
    ctx.setLineDash([6,4]);
    ctx.stroke();
    ctx.setLineDash([]);
    const txt='현재 (2026.02)';
    ctx.font='bold 10px sans-serif';
    const tw=ctx.measureText(txt).width;
    const bw=tw+14, bh=18;
    let bx=x-bw/2;
    bx=Math.max(chartArea.left+2, Math.min(bx, chartArea.right-bw-2));
    const by=top+4;
    ctx.fillStyle='rgba(220,38,38,.88)';
    ctx.beginPath();
    ctx.roundRect(bx,by,bw,bh,4);
    ctx.fill();
    ctx.fillStyle='#fff';
    ctx.textAlign='center';
    ctx.fillText(txt, bx+bw/2, by+12);
    ctx.restore();
  }
};
Chart.register(vertLinePlugin);

function updateMainChart(){
  const startStr=(document.getElementById('range-start').value||'2024.02').trim();
  const endStr  =(document.getElementById('range-end-yr').value||'2026').trim();
  const income  =parseProjVal('p-income');
  const expense =parseProjVal('p-expense');
  const rate    =parseFloat(document.getElementById('p-rate').value)||8;
  const mRate   =rate/100/12;

  // 실제 데이터 시작 인덱스
  const siRaw=dateToIdx(startStr);
  const si=siRaw!==null?siRaw:0;

  const labels    =[...DATES.slice(si)];
  const assetSlice=[...ASSET_TOT.slice(si)];
  const debtSlice =[...DEBT_TOT.slice(si)];
  const netSlice  =[...NET_TOT.slice(si)];
  const fixedSlice=[...FIXED.slice(si)].map(v=>Math.round(v/1e6));

  // 전망선 배열 (실제 구간은 null, 현재 지점부터 값)
  const projNetArr  =new Array(labels.length).fill(null);
  const projAssetArr=new Array(labels.length).fill(null);
  const debtProjArr =new Array(labels.length).fill(null);

  // 전망 시작점: 2026-02 (마지막 실제 데이터) → 해당 인덱스에 연결 앵커 세팅
  const anchorIdx=labels.indexOf('2026-02');
  if(anchorIdx>=0){
    projNetArr[anchorIdx]  =Math.round(NET_2602/1e6);
    projAssetArr[anchorIdx]=Math.round((NET_2602+DEBT_2602)/1e6);
    debtProjArr[anchorIdx] =Math.round(DEBT_2602/1e6);
  }

  // 종료 날짜까지 전망 계산
  const endYM =parseYM(endStr);
  const baseYM={year:2026,month:2};
  const projMonths=endYM?Math.max(0,monthsBetween(baseYM,endYM)):12;

  let lastNet=NET_2602, lastDebt=DEBT_2602;
  for(let m=1;m<=projMonths;m++){
    const lbl=addMonths(baseYM,m);
    lastNet=lastNet*(1+mRate)+(income-expense); // 복리 + 순저축
    const lastAsset=lastNet+lastDebt;
    labels.push(lbl);
    assetSlice.push(null);
    debtSlice.push(null);
    netSlice.push(null);
    fixedSlice.push(1013);
    projNetArr.push(Math.round(lastNet/1e6));
    projAssetArr.push(Math.round(lastAsset/1e6));
    debtProjArr.push(Math.round(lastDebt/1e6));
  }

  // 전망 종료 시점 순자산 (범례에 표시용)
  const finalNet=Math.round(lastNet/1e8*100)/100;

  const toM=v=>v===null?null:Math.round(v/1e6);

  // 범례 HTML 업데이트
  const legendEl=document.getElementById('chart-legend');
  if(legendEl){
    const isProj=projMonths>0;
    legendEl.innerHTML=`
      <span style="display:flex;align-items:center;gap:4px"><span style="width:20px;height:3px;background:#2563eb;display:inline-block;border-radius:2px"></span>총자산</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:20px;height:3px;background:#16a34a;display:inline-block;border-radius:2px"></span>순자산</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:20px;height:2px;background:#dc2626;display:inline-block;border-radius:2px;border-top:2px dashed #dc2626"></span>부채</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:20px;height:2px;background:#94a3b8;display:inline-block;border-radius:2px"></span>고정자산</span>
      ${isProj?`<span style="display:flex;align-items:center;gap:4px;color:#16a34a;font-weight:700"><span style="width:20px;border-top:2px dashed #16a34a;display:inline-block"></span>전망 순자산</span>
      <span style="font-size:11px;color:#555;margin-left:4px">종료시점: <strong style="color:#16a34a">${finalNet}억</strong></span>`:''}`;
  }

  if(chartMain) chartMain.destroy();
  const ctx=document.getElementById('chartMain').getContext('2d');
  chartMain=new Chart(ctx,{
    type:'line',
    data:{
      labels,
      datasets:[
        {label:'총자산',     data:assetSlice.map(toM), borderColor:'#2563eb',backgroundColor:'rgba(37,99,235,.07)',fill:true, tension:.3,pointRadius:2,  borderWidth:2,  spanGaps:false},
        {label:'부채',       data:debtSlice.map(toM),  borderColor:'#dc2626',backgroundColor:'rgba(220,38,38,.05)',fill:true, tension:.1,pointRadius:0,  borderWidth:1.5,borderDash:[5,4],spanGaps:false},
        {label:'순자산',     data:netSlice.map(toM),   borderColor:'#16a34a',backgroundColor:'rgba(22,163,74,.1)', fill:true, tension:.3,pointRadius:2.5,borderWidth:2.5,spanGaps:false},
        {label:'고정자산',   data:fixedSlice,           borderColor:'#cbd5e1',backgroundColor:'transparent',       fill:false,tension:0, pointRadius:0,  borderWidth:1.2,borderDash:[2,4]},
        {label:'전망 부채',  data:debtProjArr,          borderColor:'#dc2626',backgroundColor:'rgba(220,38,38,.03)',fill:true, tension:.1,pointRadius:0,  borderWidth:1.5,borderDash:[5,4],spanGaps:false},

      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{display:false},
        tooltip:{
          callbacks:{
            title:items=>{
              const lbl=items[0].label;

              return `${lbl}  (${isAfter?'전망':'실적'})`;
            },
            label:c=>{
              if(c.raw===null||c.raw===undefined) return '';
              const n=c.raw; // 백만원 단위
              return ` ${c.dataset.label}: ${(n/100).toFixed(2)}억`;

          }
        }
      },
      scales:{
        x:{ticks:{font:{size:10},maxRotation:45,autoSkip:true,maxTicksLimit:28},grid:{color:'rgba(0,0,0,.04)'}},

    prEl.innerHTML='';
  }

function makeDoughnut(canvasId, labels, vals, colors, legId, totId){
  const total=vals.reduce((a,b)=>a+b,0);
  const ctx=document.getElementById(canvasId).getContext('2d');
  new Chart(ctx,{
    type:'doughnut',
    data:{labels,datasets:[{data:vals,backgroundColor:colors,borderWidth:1,borderColor:'#fff'}]},
    options:{
      responsive:true,maintainAspectRatio:false,cutout:'48%',
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:c=>{
          if(!c.raw) return '';
          const pct=((c.raw/total)*100).toFixed(1);
          return ` ${c.label}: ${(c.raw/1e8).toFixed(2)}억 (${pct}%)`;
        }}}
      }
    }
  });
  if(legId){
    document.getElementById(legId).innerHTML=labels.map((l,i)=>{
      if(!vals[i]) return '';
      const pct=((vals[i]/total)*100).toFixed(1);
      return`<span><span class="pie-dot" style="background:${colors[i]}"></span>${l} ${pct}%</span>`;
    }).join('');
  }
  if(totId) document.getElementById(totId).innerHTML=`합계: <strong>${(total/1e8).toFixed(2)}억</strong>`;
}

        // 각 그룹 경계 (0.5, 1.5 사이)
        [0.5,1.5].forEach(pos=>{
          const x=xScale.getPixelForValue(pos);
          ctx.beginPath();
          ctx.moveTo(x,chartArea.top);
          ctx.lineTo(x,chartArea.bottom);
          ctx.stroke();
        });
        ctx.restore();
      }
    };
    new Chart(ctx2,{
      type:'bar',
      data:{
        labels:['기초','ISA','투자'],
        datasets:[
          {label:'동철',data:[dc기초,dcISA,dc투자].map(v=>Math.round(v/1e6)),
           backgroundColor:'#3b82f6',borderRadius:4,barPercentage:.55},
          {label:'규현',data:[gh기초,ghISA,gh투자].map(v=>Math.round(v/1e6)),

        responsive:true,maintainAspectRatio:false,

          legend:{display:true,position:'bottom',labels:{font:{size:11},boxWidth:12,padding:8}},

        }
      },
      plugins:[dividerPlugin2]
    });
  }

  // ── 3. 기관별 (한투/키움/빗썸/기타 4개)

  const han_gh=ghRows.filter(r=>r.inst==='한투').reduce((a,r)=>a+r.v[2],0);

  const etc4  =ROWS.filter(r=>!['한투','키움','빗썸'].includes(r.inst)).reduce((a,r)=>a+Math.max(0,r.v[2]),0);
  {
    const inst_labels=['한투','키움','빗썸','기타'];
    const inst_vals=[han_dc+han_gh, ki_dc+ki_gh, bit, etc4].map(v=>Math.round(v/1e6));
    const inst_colors=['#3b82f6','#ec4899','#f59e0b','#94a3b8'];
    const ctx3=document.getElementById('chartPie3').getContext('2d');
    new Chart(ctx3,{
      type:'bar',
      data:{
        labels:inst_labels,
        datasets:[{
          label:'금액',data:inst_vals,
          backgroundColor:inst_colors,borderRadius:4,barPercentage:.6
        }]

          y:{ticks:{font:{size:10},callback:v=>(v/100).toFixed(1)+'억'},grid:{color:'rgba(0,0,0,.05)'}}
        }
      }
    });
  }

function showNotePopup(el, noteKey){
  closeNotePopup();
  const val=getNote(noteKey);
  const popup=document.createElement('div');
  popup.id='note-popup';
  popup.style.cssText='position:fixed;z-index:9999;background:#1a1a1a;color:#fff;padding:12px 14px;border-radius:8px;font-size:12px;max-width:280px;line-height:1.6;box-shadow:0 4px 24px rgba(0,0,0,.4);pointer-events:auto';
  const r=el.getBoundingClientRect();
  let left=r.left, top=r.bottom+6;
  if(left+280>window.innerWidth) left=window.innerWidth-290;
  popup.style.left=left+'px'; popup.style.top=top+'px';
  popup.innerHTML=`<div style="font-weight:700;color:#f59e0b;margin-bottom:6px">📝 증감 사유</div>
    <textarea id="note-popup-ta" style="width:100%;height:64px;background:#2a2a2a;color:#fff;border:1px solid #555;border-radius:4px;padding:6px;font-size:12px;font-family:inherit;resize:none">${val||''}</textarea>
    <div style="display:flex;justify-content:flex-end;gap:6px;margin-top:7px">
      <button onclick="closeNotePopup()" style="padding:4px 11px;background:transparent;color:#aaa;border:1px solid #555;border-radius:4px;cursor:pointer;font-size:11px">취소</button>
      <button onclick="saveNotePopup('${noteKey}')" style="padding:4px 11px;background:#f59e0b;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:11px;font-weight:600">저장</button>
    </div>`;
  document.body.appendChild(popup);
  setTimeout(()=>document.addEventListener('click',outsideClickClose,{once:true}),100);
}
function outsideClickClose(e){
  const p=document.getElementById('note-popup');
  if(p&&!p.contains(e.target)) closeNotePopup();
}
function saveNotePopup(key){
  const ta=document.getElementById('note-popup-ta');
  if(ta){saveNote(key,ta.value);showToast('비고 저장됨');}
  closeNotePopup();
}
function closeNotePopup(){const p=document.getElementById('note-popup');if(p)p.remove();}

function diffCell(cur, prev, noteKey){
  if(cur===null||prev===null) return '—';
  const d=Math.round(cur-prev);
  const cls=d>0?'p':d<0?'n':'z';
  const txt=(d>0?'+':'')+fmtN(d);
  const hasNote=!!getNote(noteKey);
  const dot=hasNote?`<sup style="font-size:8px;margin-left:1px;color:#f59e0b">✎</sup>`:'';
  return `<span class="df ${cls} diff-clickable" onclick="showNotePopup(this,'${noteKey}')" style="cursor:pointer">${txt}${dot}</span>`;
}

  let h=`<div class="person-section">
    <div class="person-title ${cc}">
      <div class="av">${person[0]}</div>
      <span class="pname">${person}</span>
      <span class="psum">전월 합계: <strong>${fmtN(totC)}</strong> │ 3월 입력: <strong id="psum-${person}">—</strong></span>
    </div>`;
  for(const cat1 of['기초','ISA','투자']){
    const crows=rows.filter(r=>r.cat1===cat1);
    if(!crows.length) continue;
    const meta=CAT1_META[cat1];
    const ccC=crows.reduce((a,r)=>a+r.v[2],0),ccP=crows.reduce((a,r)=>a+r.v[1],0);
    const cc0=crows.reduce((a,r)=>a+r.v[0],0),cc1=crows.reduce((a,r)=>a+r.v[1],0);
    h+=`<div class="cat1-group">
      <div class="cat1-hdr h-${cat1}">
        <span>${meta.icon} ${cat1}</span>
        <span class="c-desc">${meta.desc}</span>
        <span class="c-sub">전월: ${fmtN(ccC)}</span>
        <span class="c-inpsum" id="cs-${person}-${cat1}">│ 입력: —</span>
      </div>
      <div class="tbl-wrap"><table>${THEAD}<tbody>`;
    crows.forEach(row=>{
      const gi=ROWS.indexOf(row);
      const id=iid(person,gi);
      h+=`<tr class="val-row">
        <td><span class="itag i-${row.inst}">${row.inst}</span></td>
        <td style="font-size:12px;color:#666;font-weight:600">${row.cat2}</td>
        <td style="font-size:12px;color:#333;font-weight:500;line-height:1.4;max-width:120px;word-break:keep-all;font-size:11px">${row.product}</td>
        <td class="r"><span class="n ${nCls(row.v[0])}">${row.v[0]===0?'—':fmtN(row.v[0])}</span></td>
        <td class="r"><span class="n ${nCls(row.v[1])}">${row.v[1]===0?'—':fmtN(row.v[1])}</span></td>
        <td class="r bg-cur"><span class="n ${nCls(row.v[2])}">${row.v[2]===0?'—':fmtN(row.v[2])}</span></td>
        <td class="bg-inp"><input class="inp" id="${id}" type="text" inputmode="numeric" placeholder="0" autocomplete="off"
          data-prev="${row.v[2]}" data-person="${person}" data-gi="${gi}"
          oninput="onInp(this)" onkeydown="onKey(event,this)"/></td>
      </tr>
      <tr class="diff-row">
        <td colspan="3" style="padding:0 0 4px 0;border-bottom:1px solid #ebebea"></td>
        <td class="r diff-sub"></td>
        <td class="r diff-sub">${diffCell(row.v[1],row.v[0],'nk_'+gi+'_m1')}</td>
        <td class="r diff-sub bg-cur">${diffCell(row.v[2],row.v[1],'nk_'+gi+'_m2')}</td>
        <td class="bg-inp r diff-sub" id="idiff-${id}">—</td>
      </tr>`;
    });
    h+=`<tr class="sub-row">
      <td colspan="3" style="font-size:11px;color:#777">소계</td>
      <td class="r"><span class="n">${fmtN(cc0)}</span></td>
      <td class="r"><span class="n">${fmtN(cc1)}</span></td>
      <td class="r bg-cur"><span class="n">${fmtN(ccC)}</span></td>
      <td class="bg-inp r" id="ci-${person}-${cat1}">—</td>
    </tr>
    <tr class="diff-row sub-diff-row">
      <td colspan="3"></td>
      <td class="r diff-sub"></td>
      <td class="r diff-sub">${diffCell(cc1,cc0,'nk_sub_'+person+'_'+cat1+'_m1')}</td>
      <td class="r diff-sub bg-cur">${diffCell(ccC,ccP,'nk_sub_'+person+'_'+cat1+'_m2')}</td>
      <td class="bg-inp r diff-sub" id="cid-${person}-${cat1}">—</td>
    </tr></tbody></table></div></div>`;
  }
  h+=`<div class="tbl-wrap" style="border-top:1px solid #e0e0dc"><table><tbody>
    <tr class="total-row">
      <td colspan="3">${person} 합계</td>
      <td class="r">${fmtN(tot0)}</td><td class="r">${fmtN(tot1)}</td>
      <td class="r">${fmtN(totC)}</td>
      <td class="r" id="pt-${person}">—</td>
    </tr>
    <tr class="diff-row" style="background:#1a1a1a">
      <td colspan="3" style="padding:3px 0"></td>
      <td class="r diff-sub" style="color:#aaa"></td>
      <td class="r diff-sub" style="color:#aaa">${diffCell(tot1,tot0,'nk_tot_'+person+'_m1')}</td>
      <td class="r diff-sub" style="color:#aaa">${diffCell(totC,totP,'nk_tot_'+person+'_m2')}</td>
      <td class="r diff-sub" style="color:#aaa" id="ptd-${person}">—</td>
    </tr>
  </tbody></table></div></div>`;
  return h;
}

function buildBottom(){
  // 컬럼: 항목 | 전전월 | 전월 | 당월(입력) | 증감
  const T2=`<thead><tr>
    <th>항목</th>
    <th class="r" style="width:88px">${MONTHS[0]}</th>
    <th class="r" style="width:88px">${MONTHS[1]}</th>
    <th class="th-inp" style="width:104px">${MONTHS[2]} (입력)</th>
    <th class="r th-cur" style="width:60px">증감</th>
  </tr></thead>`;

  // 과거 2개월 + 입력란 + 증감 행
  function bRow(label, vals, inpId, pfx){
    const prev = vals[1]; // 전월(2026-01)
    const prevVal = vals[2]; // 직전 당월(2026-02 실적) → placeholder
    return `<tr class="val-row">
      <td style="font-size:12px;font-weight:500">${label}</td>
      <td class="r"><span class="n ${nCls(vals[0])}" style="font-size:12px">${vals[0]===0||vals[0]===null?'—':fmtN(vals[0])}</span></td>
      <td class="r"><span class="n ${nCls(vals[1])}" style="font-size:12px">${vals[1]===0||vals[1]===null?'—':fmtN(vals[1])}</span></td>
      <td class="bg-inp"><input class="inp" id="${inpId}" type="text" inputmode="numeric"
        placeholder="${prevVal===0?'0':fmtN(prevVal)}" autocomplete="off"
        data-prev="${vals[2]}" data-type="bottom"
        oninput="onBotInp(this)" style="font-size:12px"/></td>
      <td class="r diff-sub bg-cur" id="${inpId}-diff">—</td>
    </tr>
    <tr class="diff-row">
      <td style="padding:0 0 3px 0;border-bottom:1px solid #ebebea"></td>
      <td class="r diff-sub"></td>
      <td class="r diff-sub">${diffCell(vals[1],vals[0],pfx+'_m1')}</td>
      <td class="r diff-sub bg-inp" style="font-size:11px;color:#888">↑ 직접 입력</td>
      <td class="r diff-sub bg-cur" id="${inpId}-diff2">—</td>
    </tr>`;
  }

  // 부채
  let debtH=`<div class="tbl-wrap"><table>${T2}<tbody>`;
  DEBT_ROWS.forEach((row,i)=>{
    debtH+=bRow(row.label, row.v, 'debt-inp-'+i, 'nk_d'+i);
  });
  debtH+=`<tr class="sub-row">
    <td>부채 합계</td>
    <td class="r"><span class="n r" style="font-size:12px">${fmtN(DEBT_TOT_3[0])}</span></td>
    <td class="r"><span class="n r" style="font-size:12px">${fmtN(DEBT_TOT_3[1])}</span></td>
    <td class="bg-inp r" id="debt-tot-inp" style="font-size:12px;font-weight:700;color:#dc2626">—</td>
    <td class="r diff-sub bg-cur" id="debt-tot-diff">—</td>
  </tr>
  <tr class="diff-row sub-diff-row"><td></td><td class="r diff-sub"></td>
    <td class="r diff-sub">${diffCell(DEBT_TOT_3[1],DEBT_TOT_3[0],'nk_dT_m1')}</td>
    <td class="r diff-sub bg-inp"></td>
    <td class="r diff-sub bg-cur" id="debt-tot-diff2">—</td>
  </tr></tbody></table></div>`;

  // 수입
  let incH=`<div class="tbl-wrap"><table>${T2}<tbody>`;
  INC_ROWS.forEach((row,i)=>{
    incH+=bRow(row.label, row.v, 'inc-inp-'+i, 'nk_inc'+i);
  });
  incH+=`<tr class="sub-row">
    <td>수입 합계</td>
    <td class="r"><span class="n g" style="font-size:12px">${fmtN(INC_TOT_3[0])}</span></td>
    <td class="r"><span class="n g" style="font-size:12px">${fmtN(INC_TOT_3[1])}</span></td>
    <td class="bg-inp r" id="inc-tot-inp" style="font-size:12px;font-weight:700;color:#16a34a">—</td>
    <td class="r diff-sub bg-cur" id="inc-tot-diff">—</td>
  </tr>
  <tr class="diff-row sub-diff-row"><td></td><td class="r diff-sub"></td>
    <td class="r diff-sub">${diffCell(INC_TOT_3[1],INC_TOT_3[0],'nk_incT_m1')}</td>
    <td class="r diff-sub bg-inp"></td>
    <td class="r diff-sub bg-cur" id="inc-tot-diff2">—</td>
  </tr></tbody></table></div>`;

  return `<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start;margin-top:20px">
    <div><div class="sec-title">부채</div>${debtH}</div>
    <div><div class="sec-title">수입</div>${incH}</div>
  </div>`;
}

function onBotInp(el){
  const raw=el.value.replace(/[^\d\-]/g,'');
  if(raw===''||raw==='-'){el.value=raw;}
  else{const n=parseInt(raw,10);if(!isNaN(n))el.value=n.toLocaleString('ko-KR');}
  const cur=parseV(el.value);
  el.classList.toggle('filled',cur!==null&&cur>=0);
  el.classList.toggle('neg-val',cur!==null&&cur<0);
  const prev=parseInt(el.dataset.prev)||0;
  const noteKey=el.id+'_m3'; // e.g. debt-inp-0_m3
  const diffEl=document.getElementById(el.id+'-diff');
  const diff2El=document.getElementById(el.id+'-diff2');
  function renderDiff(targetEl){
    if(!targetEl) return;
    if(cur===null){targetEl.innerHTML='—';return;}
    const d=cur-prev;
    const cls=d>0?'p':d<0?'n':'z';
    const hasNote=!!getNote(noteKey);
    const dot=hasNote?`<sup style="font-size:8px;color:#f59e0b">✎</sup>`:'';
    targetEl.innerHTML=`<span class="df ${cls} diff-clickable" onclick="showNotePopup(this,'${noteKey}')" style="cursor:pointer">${(d>0?'+':'')+fmtN(d)}${dot}</span>`;
  }
  renderDiff(diffEl);
  renderDiff(diff2El);
  updBotTotals();
}

function updBotTotals(){
  function mkDiff(val, prev, noteKey){
    const d=val-prev;
    const cls=d>0?'p':d<0?'n':'z';
    const hasNote=!!getNote(noteKey);
    const dot=hasNote?`<sup style="font-size:8px;color:#f59e0b">✎</sup>`:'';
    return `<span class="df ${cls} diff-clickable" onclick="showNotePopup(this,'${noteKey}')" style="cursor:pointer">${(d>0?'+':'')+fmtN(d)}${dot}</span>`;
  }
  // 부채 합계
  let dSum=0, dCnt=0;
  DEBT_ROWS.forEach((_,i)=>{
    const el=document.getElementById('debt-inp-'+i);
    const v=el?parseV(el.value):null;
    if(v!==null){dSum+=v;dCnt++;}
  });
  const dTotEl=document.getElementById('debt-tot-inp');
  const dDiffEl=document.getElementById('debt-tot-diff');
  const dDiff2El=document.getElementById('debt-tot-diff2');
  if(dCnt>0&&dTotEl){
    dTotEl.textContent=fmtN(dSum);
    const dt=mkDiff(dSum,DEBT_TOT_3[1],'nk_dT_m3');
    if(dDiffEl) dDiffEl.innerHTML=dt;
    if(dDiff2El) dDiff2El.innerHTML=dt;
  }else{
    if(dTotEl) dTotEl.textContent='—';
    if(dDiffEl) dDiffEl.textContent='—';
    if(dDiff2El) dDiff2El.textContent='—';
  }
  // 수입 합계
  let iSum=0, iCnt=0;
  INC_ROWS.forEach((_,i)=>{
    const el=document.getElementById('inc-inp-'+i);
    const v=el?parseV(el.value):null;
    if(v!==null){iSum+=v;iCnt++;}
  });
  const iTotEl=document.getElementById('inc-tot-inp');
  const iDiffEl=document.getElementById('inc-tot-diff');
  const iDiff2El=document.getElementById('inc-tot-diff2');
  if(iCnt>0&&iTotEl){
    iTotEl.textContent=fmtN(iSum);
    const it=mkDiff(iSum,INC_TOT_3[1],'nk_incT_m3');
    if(iDiffEl) iDiffEl.innerHTML=it;
    if(iDiff2El) iDiff2El.innerHTML=it;
  }else{
    if(iTotEl) iTotEl.textContent='—';
    if(iDiffEl) iDiffEl.textContent='—';
    if(iDiff2El) iDiff2El.textContent='—';
  }
}


/* ════════════════════════════════════════
   입력 이벤트
════════════════════════════════════════ */
function onInp(el){
  const raw=el.value.replace(/[^\d\-]/g,'');
  if(raw===''||raw==='-'){el.value=raw;}
  else{const n=parseInt(raw,10);if(!isNaN(n))el.value=n.toLocaleString('ko-KR');}
  const cur=parseV(el.value);
  el.classList.toggle('filled',cur!==null&&cur>=0);
  el.classList.toggle('neg-val',cur!==null&&cur<0);
  updRowDiff(el);updSums(el.dataset.person);
}
function onKey(e,el){
  if(e.key==='Enter'||e.key==='Tab'){
    e.preventDefault();
    const person=el.dataset.person,gi=parseInt(el.dataset.gi);
    const pis=ROWS.map((r,i)=>({r,i})).filter(({r})=>r.name===person);
    const pos=pis.findIndex(({i})=>i===gi);
    if(pos<pis.length-1){const nx=document.getElementById(iid(person,pis[pos+1].i));if(nx){nx.focus();nx.select();}}
  }
}
function updRowDiff(el){
  const prev=parseInt(el.dataset.prev)||0,cur=parseV(el.value);
  const de=document.getElementById('idiff-'+el.id);
  if(!de)return;
  if(cur===null){de.textContent='—';de.className='r bg-inp';return;}
  const d=cur-prev;
  de.innerHTML=`<span class="df ${d>0?'p':d<0?'n':'z'}">${(d>0?'+':'')+fmtN(d)}</span>`;
}
function updSums(person){
  const pis=ROWS.map((r,i)=>({r,i})).filter(({r})=>r.name===person);
  let pTot=0,pCnt=0;
  for(const cat1 of['기초','ISA','투자']){
    const cis=pis.filter(({r})=>r.cat1===cat1);
    let cSum=0,cCnt=0;
    cis.forEach(({r,i})=>{
      const el=document.getElementById(iid(person,i));
      const v=el?parseV(el.value):null;
      if(v!==null){cSum+=v;cCnt++;pTot+=v;pCnt++;}
    });
    const prevC=cis.reduce((a,{r})=>a+r.v[2],0);
    const csE=document.getElementById(`cs-${person}-${cat1}`);
    const ciE=document.getElementById(`ci-${person}-${cat1}`);
    const cidE=document.getElementById(`cid-${person}-${cat1}`);
    if(csE)csE.textContent=cCnt?`│ 입력: ${fmtN(cSum)}`:'│ 입력: —';
    if(ciE)ciE.innerHTML=cCnt?`<span class="n">${fmtN(cSum)}</span>`:'—';
    if(cidE&&cCnt){const d=cSum-prevC;cidE.innerHTML=`<span class="df ${d>0?'p':d<0?'n':'z'}">${(d>0?'+':'')+fmtN(d)}</span>`;}
    else if(cidE)cidE.innerHTML='—';
  }
  const prevTot=pis.reduce((a,{r})=>a+r.v[2],0);
  const ptE=document.getElementById(`pt-${person}`);
  const ptdE=document.getElementById(`ptd-${person}`);
  const psE=document.getElementById(`psum-${person}`);
  if(pCnt>0){
    if(ptE)ptE.innerHTML=`<span class="n">${fmtN(pTot)}</span>`;
    if(psE)psE.textContent=fmtN(pTot)+'원';
    if(ptdE){const d=pTot-prevTot;ptdE.innerHTML=`<span class="df ${d>0?'p':d<0?'n':'z'}">${(d>0?'+':'')+fmtN(d)}</span>`;}
  }else{
    if(ptE)ptE.innerHTML='—';if(ptdE)ptdE.innerHTML='—';if(psE)psE.textContent='—';
  }
  updAll();
}
function updAll(){
  let tot=0,has=false;
  ROWS.forEach((r,i)=>{const el=document.getElementById(iid(r.name,i));const v=el?parseV(el.value):null;if(v!==null){tot+=v;has=true;}});
  const e=document.getElementById('sum-all');if(e)e.textContent=has?fmtN(tot):'—';
}
function resetInputs(){
  ROWS.forEach((r,i)=>{
    const el=document.getElementById(iid(r.name,i));
    if(el){el.value='';el.classList.remove('filled','neg-val');}
    const de=document.getElementById(`idiff-${iid(r.name,i)}`);
    if(de){de.textContent='—';de.className='r bg-inp';}
  });
  ['동철','규현'].forEach(p=>updSums(p));
}
function copyTSV(){
  const lines=['성명\t기관\t구분1\t구분2\t상품명\t2026-03'];
  ROWS.forEach((r,i)=>{
    const el=document.getElementById(iid(r.name,i));
    const v=el&&el.value!==''?(parseV(el.value)??''):'';
    lines.push(`${r.name}\t${r.inst}\t${r.cat1}\t${r.cat2}\t${r.product}\t${v}`);
  });
  navigator.clipboard.writeText(lines.join('\n')).then(()=>showToast('클립보드 복사 완료'));
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}

/* ── 저장 / 불러오기 ── */
const SAVE_KEY='fm_inputs_v1';
function saveAll(){
  const data={};
  ROWS.forEach((r,i)=>{
    const el=document.getElementById(iid(r.name,i));
    if(el&&el.value!=='') data['inp_'+i]=el.value;
  });
  DEBT_ROWS.forEach((_,i)=>{
    const el=document.getElementById('debt-inp-'+i);
    if(el&&el.value!=='') data['debt_'+i]=el.value;
  });
  INC_ROWS.forEach((_,i)=>{
    const el=document.getElementById('inc-inp-'+i);
    if(el&&el.value!=='') data['inc_'+i]=el.value;
  });
  data.proj_income=document.getElementById('p-income').value;
  data.proj_expense=document.getElementById('p-expense').value;
  data.proj_rate=document.getElementById('p-rate').value;
  data.range_start=document.getElementById('range-start').value;
  data.range_end=document.getElementById('range-end-yr').value;
  localStorage.setItem(SAVE_KEY,JSON.stringify(data));
  const btn=document.getElementById('btn-save');
  btn.textContent='✓ 저장됨';btn.classList.add('saved');
  setTimeout(()=>{btn.textContent='💾 저장';btn.classList.remove('saved');},2000);
}
function loadSaved(){
  try{
    const data=JSON.parse(localStorage.getItem(SAVE_KEY)||'{}');
    ROWS.forEach((r,i)=>{
      const el=document.getElementById(iid(r.name,i));
      if(el&&data['inp_'+i]){
        el.value=data['inp_'+i];
        const cur=parseV(el.value);
        el.classList.toggle('filled',cur!==null&&cur>=0);
        el.classList.toggle('neg-val',cur!==null&&cur<0);
        updRowDiff(el);
      }
    });
    DEBT_ROWS.forEach((_,i)=>{
      const el=document.getElementById('debt-inp-'+i);
      if(el&&data['debt_'+i]){
        el.value=data['debt_'+i];
        const cur=parseV(el.value);
        el.classList.toggle('filled',cur!==null&&cur>=0);
        el.classList.toggle('neg-val',cur!==null&&cur<0);
        onBotInp(el);
      }
    });
    INC_ROWS.forEach((_,i)=>{
      const el=document.getElementById('inc-inp-'+i);
      if(el&&data['inc_'+i]){
        el.value=data['inc_'+i];
        const cur=parseV(el.value);
        el.classList.toggle('filled',cur!==null&&cur>=0);
        el.classList.toggle('neg-val',cur!==null&&cur<0);
        onBotInp(el);
      }
    });
    if(data.proj_income) document.getElementById('p-income').value=data.proj_income;
    if(data.proj_expense) document.getElementById('p-expense').value=data.proj_expense;
    if(data.proj_rate) document.getElementById('p-rate').value=data.proj_rate;
    if(data.range_start) document.getElementById('range-start').value=data.range_start;
    if(data.range_end) document.getElementById('range-end-yr').value=data.range_end;
    ['동철','규현'].forEach(p=>updSums(p));
    // 저장된 전망 파라미터로 차트 재갱신
    if(data.proj_income||data.proj_rate) updateMainChart();
  }catch(e){console.warn('load failed',e);}
}

/* ── 초기화 ── */
buildSummary();
updateMainChart();
buildPieChart();
buildTable();
loadSaved();
</script>

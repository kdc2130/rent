<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, initial-scale=0.3">
<title>월별 장부 입력</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-style:normal}
:root{--bg:#f5f3ee;--sf:#fff;--s2:#fafaf8;--bd:#e0ddd6;--bd2:#ccc9c0;--tx:#111;--t2:#444;--t3:#888;--blue:#1756cc;--green:#0a6e42;--red:#c0301a;--r:8px;--rs:4px;}
body{font-family:-apple-system,"Apple SD Gothic Neo","Noto Sans KR","맑은 고딕",sans-serif;background:var(--bg);color:var(--tx);font-size:13px;min-height:100vh}
.topbar{background:var(--sf);border-bottom:1px solid var(--bd);padding:0 16px;display:flex;align-items:center;height:48px;position:sticky;top:0;z-index:100}
.ttl{font-size:15px;font-weight:700;margin-right:14px;color:#111;white-space:nowrap}
.btab{padding:0 13px;height:48px;display:flex;align-items:center;font-size:13px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;color:var(--t3);transition:color .1s,border-color .1s}
.btab.on{color:#111;border-bottom-color:#111}
.tb-r{margin-left:auto;display:flex;align-items:center;gap:8px}
.mb{width:26px;height:26px;border:1px solid var(--bd);border-radius:var(--rs);background:var(--sf);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;color:var(--t2)}
.mb:hover{background:var(--bg)}
.ml{font-size:14px;font-weight:700;min-width:66px;text-align:center;color:#111}
.sv-btn{padding:6px 13px;background:#111;color:#fff;border:none;border-radius:var(--rs);font-size:12px;font-family:inherit;cursor:pointer;font-weight:600}
.sv-btn:hover{background:#333}
.si{font-size:11px;color:var(--t3);min-width:54px}
.outer{padding:10px 12px 40px}
.sum-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:10px 14px}
.sl{font-size:11px;color:var(--t2);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.sv2{font-size:15px;font-weight:800}
.sv2.b{color:var(--blue)}.sv2.g{color:var(--green)}.sv2.r{color:var(--red)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.twrap{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow-x:auto}
table.rt{width:100%;border-collapse:collapse;table-layout:fixed}
.rt thead th{background:#e6e4de;font-size:11px;font-weight:800;color:#111;text-transform:uppercase;letter-spacing:.04em;padding:7px 7px;border-bottom:2px solid var(--bd2);white-space:nowrap}
.rt thead th.r{text-align:right}.rt thead th.c{text-align:center}
.rt tbody tr{border-bottom:1px solid var(--bd)}.rt tbody tr:last-child{border-bottom:none}
.rt tbody tr:hover{background:var(--s2)}
.rt tfoot tr{background:#e6e4de;border-top:2px solid var(--bd2)}
.rt td{padding:5px 7px;vertical-align:middle}.rt td.r{text-align:right}.rt td.c{text-align:center}
.rt tfoot td{padding:6px 7px;font-weight:800;font-size:13px;color:#111}
.ps{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:0 6px;border-radius:3px;white-space:nowrap;min-height:24px}
.ps-ok{color:var(--green);background:#e4f5ec}.ps-short{color:var(--red);background:#fdecea}.ps-empty{color:var(--t3);background:#f0efeb}
.inp{text-align:right;padding:3px 5px;border:1px solid var(--bd);border-radius:var(--rs);font-size:13px;font-family:inherit;background:var(--sf);transition:border-color .1s;width:100%;min-height:24px}
.inp:focus{outline:none;border-color:#4a90e2;box-shadow:0 0 0 2px rgba(74,144,226,.1)}
.inp.of{border-color:#b8e0cf;background:#f6fdfb}
.ecard{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.ehead{padding:7px 10px;background:#e6e4de;border-bottom:2px solid var(--bd2);display:flex;align-items:center;gap:6px}
.ehl{font-size:11px;font-weight:800;color:#111;text-transform:uppercase;letter-spacing:.04em;margin-right:auto}
.emb{width:22px;height:22px;border:1px solid var(--bd2);border-radius:3px;background:var(--sf);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;color:var(--t2);flex-shrink:0}
.emb:hover{background:var(--bg)}
.eml{font-size:12px;font-weight:700;color:#111;min-width:58px;text-align:center}
.eht{font-size:12px;font-weight:800;color:#111;margin-left:4px}
.etbl{width:100%;border-collapse:collapse}
.etbl tr{border-bottom:1px solid var(--bd)}.etbl tr:last-child{border-bottom:none}
.etbl td{padding:4px 7px;font-size:12px;vertical-align:middle}
.etbl thead td{background:#e6e4de;font-size:10px;font-weight:800;color:#111;text-transform:uppercase;letter-spacing:.04em;padding:5px 7px;border-bottom:2px solid var(--bd2)}
.etbl tfoot tr{background:#e6e4de;border-top:2px solid var(--bd2)}
.etbl tfoot td{padding:5px 7px;font-weight:800;font-size:12px;color:#111}
.einp{width:100%;text-align:right;padding:2px 5px;border:1px solid var(--bd);border-radius:3px;font-size:12px;font-family:inherit;background:transparent}
.einp:focus{outline:none;border-color:#4a90e2;background:var(--sf)}
.einp.of{background:#f6fdfb;border-color:#b8e0cf}
.tinp{width:100%;padding:2px 5px;border:1px solid var(--bd);border-radius:3px;font-size:12px;font-family:inherit;background:transparent}
.tinp:focus{outline:none;border-color:#4a90e2;background:var(--sf)}
.gyok-tag{display:inline-block;font-size:10px;padding:1px 5px;border-radius:3px;background:#f0efeb;color:var(--t2)}
.note-cell{font-size:11px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px}
.add-row-btn{display:flex;align-items:center;gap:4px;padding:5px 10px;font-size:11px;color:var(--blue);cursor:pointer;background:none;border:none;font-family:inherit;width:100%}
.add-row-btn:hover{background:var(--s2)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;align-items:center;justify-content:center}
.modal-box{background:var(--sf);border-radius:var(--r);width:420px;max-width:94vw;box-shadow:0 8px 32px rgba(0,0,0,.2);overflow:hidden}
.modal-head{padding:12px 16px;background:#e6e4de;border-bottom:2px solid var(--bd2);display:flex;align-items:center;justify-content:space-between}
.modal-head-title{font-size:14px;font-weight:800;color:#111}
.modal-close{border:none;background:none;font-size:18px;cursor:pointer;color:var(--t3);line-height:1;padding:0}
.modal-body{padding:12px 16px;max-height:300px;overflow-y:auto}
.modal-foot{padding:10px 16px;border-top:1px solid var(--bd);display:flex;gap:8px}
.modal-foot input{flex:1;padding:6px 10px;border:1px solid var(--bd);border-radius:var(--rs);font-size:13px;font-family:inherit}
.modal-foot input:focus{outline:none;border-color:#4a90e2}
.modal-foot button{padding:6px 14px;background:#111;color:#fff;border:none;border-radius:var(--rs);font-size:12px;font-family:inherit;cursor:pointer;font-weight:600}
/* 호실별 비용 */
.room-section{margin-top:16px;border-top:2px solid var(--bd);padding-top:12px}
.room-section-title{font-size:13px;font-weight:800;color:#111;margin-bottom:10px;letter-spacing:-.3px}
.room-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:6px;margin-bottom:12px}
.room-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:8px 10px;cursor:pointer;transition:border-color .1s,box-shadow .1s}
.room-card:hover{border-color:var(--bd2);box-shadow:0 2px 6px rgba(0,0,0,.06)}
.room-card.sel{border-color:var(--blue);box-shadow:0 0 0 2px rgba(23,86,204,.15)}
.rc-num{font-size:15px;font-weight:800;color:#111;margin-bottom:2px}
.rc-name{font-size:11px;color:var(--t2);font-weight:500;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rc-cnt{font-size:10px;color:var(--t3)}.rc-total{font-size:11px;font-weight:700;color:var(--red);margin-top:2px}
.detail-wrap{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.detail-header{padding:9px 12px;background:#e6e4de;border-bottom:2px solid var(--bd2);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.dh-room{font-size:16px;font-weight:800;color:#111}.dh-name{font-size:13px;font-weight:600;color:var(--t2)}.dh-total{margin-left:auto;font-size:12px;font-weight:700;color:var(--red)}
.detail-filters{padding:7px 10px;border-bottom:1px solid var(--bd);display:flex;gap:5px;align-items:center;background:var(--s2);flex-wrap:wrap}
.df-label{font-size:11px;color:var(--t3);font-weight:600}
.yr-btn{padding:2px 7px;border:1px solid var(--bd);border-radius:4px;background:var(--sf);font-size:11px;cursor:pointer;font-family:inherit;color:var(--t2)}
.yr-btn.on{background:#111;color:#fff;border-color:#111}
.detail-table{width:100%;border-collapse:collapse}
.detail-table thead th{background:#f0efeb;font-size:11px;font-weight:800;color:#111;padding:6px 9px;border-bottom:1px solid var(--bd);text-align:left}
.detail-table thead th.r{text-align:right}
.detail-table tbody tr{border-bottom:1px solid var(--bd)}.detail-table tbody tr:last-child{border-bottom:none}
.detail-table tbody tr:hover{background:var(--s2)}
.detail-table td{padding:5px 9px;font-size:12px}
.detail-table td.r{text-align:right;font-family:monospace}
.detail-table tfoot tr{background:#e6e4de;border-top:2px solid var(--bd2)}
.detail-table tfoot td{padding:6px 9px;font-weight:800;font-size:12px}
.month-chip{display:inline-block;font-size:10px;padding:1px 5px;border-radius:3px;background:#f0efeb;color:var(--t2);white-space:nowrap;font-family:monospace}
.note-txt{font-size:11px;color:var(--t3);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.empty-msg{padding:24px;text-align:center;color:var(--t3);font-size:12px}
mark{background:#ffe066;border-radius:2px;padding:0 1px}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}

.chart-section{margin:10px 0;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.chart-tabs{display:flex;border-bottom:1px solid var(--bd);background:#f0efeb}
.ctab{padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;color:var(--t3);border-bottom:2px solid transparent}
.ctab.on{color:var(--blue);border-bottom-color:var(--blue)}
.chart-body{padding:12px 16px 10px}
canvas.chart-canvas{width:100%!important;max-height:200px}
.grid2{display:grid;grid-template-columns:3fr 2fr;gap:10px}
.note-popup{display:none;position:fixed;background:var(--sf);border:1px solid var(--bd2);border-radius:var(--rs);padding:8px 12px;font-size:12px;color:var(--tx);max-width:300px;z-index:500;box-shadow:0 4px 12px rgba(0,0,0,.15);line-height:1.5}
.note-popup.show{display:block}
.note-link{cursor:pointer;color:var(--blue);font-size:11px}
.inc-main{font-size:15px;font-weight:800}
.inc-sub{font-size:10px;color:var(--t3);margin-top:1px}

.chart-pane{height:260px;position:relative}

/* 정산 탭 */
.settle-section{padding:12px 14px 40px}

/* ── 모바일 반응형 ─────────────────────────────────────── */
@media (max-width: 640px) {
  .nav-txt{display:none}
  /* 탑바 */
  .topbar{padding:0 8px;gap:0}
  .ttl{font-size:13px;margin-right:6px}
  .btab{padding:0 8px;font-size:12px}
  .tb-r{gap:4px}
  .ml{font-size:13px;min-width:54px}
  .mb{width:24px;height:24px}
  .sv-btn{padding:5px 8px;font-size:11px}
  .si{display:none}

  /* 내비 바 */
  .outer{padding:6px 6px 40px}

  /* 요약 스트립: 2×2 */
  .sum-strip{grid-template-columns:1fr 1fr;gap:5px;padding:8px 10px}
  .sl{font-size:10px}
  .sv2{font-size:13px}

  /* 메인 그리드: 1열로 */
  .grid2{grid-template-columns:1fr!important}

  /* 입금 테이블: 계약일/만료일/지속 컬럼 숨김 */
  .rt-hide-mobile{display:none}

  /* 차트 높이 줄임 */
  .chart-pane{height:180px}
  canvas.chart-canvas{max-height:180px}

  /* 호실 카드 */
  .room-grid{grid-template-columns:repeat(auto-fill,minmax(80px,1fr))}

  /* 정산 폼 세로 배치 */
  #settle-content [style*="grid-template-columns:1fr 340px"]{
    display:block!important
  }
  #settle-form-panel{margin-top:10px}

  /* 납부내역 overview 테이블 폰트 */
  .ph-overview th,.ph-overview td{font-size:10px;padding:4px 5px}
}

@media (max-width: 400px) {
  .btab{padding:0 5px;font-size:11px}
  .ttl{font-size:12px}
}
</style>
</head>
<body>
<div id="pw-screen" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#1a1a2e;display:flex;align-items:center;justify-content:center;z-index:9999;">
  <div style="background:#fff;border-radius:12px;padding:40px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.3);min-width:280px;">
    <div style="font-size:32px;margin-bottom:16px;">🔒</div>
    <div style="font-size:18px;font-weight:600;margin-bottom:24px;color:#333;">장부 접근</div>
    <input id="pw-input" type="password" placeholder="비밀번호 입력"
      style="width:100%;padding:12px;border:2px solid #ddd;border-radius:8px;font-size:16px;text-align:center;outline:none;box-sizing:border-box;"
      onkeydown="if(event.key==='Enter')checkPw()">
    <div id="pw-error" style="color:#e74c3c;font-size:13px;margin-top:8px;height:20px;"></div>
    <button onclick="checkPw()"
      style="width:100%;padding:12px;background:#3498db;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;margin-top:8px;">
      확인
    </button>
  </div>
</div>
<script>
function checkPw(){
  var pw=document.getElementById("pw-input").value;
  if(pw==="0805"){
    document.getElementById("pw-screen").style.display="none";
    sessionStorage.setItem("auth","ok");
  } else {
    document.getElementById("pw-error").textContent="비밀번호가 틀렸습니다.";
    document.getElementById("pw-input").value="";
    document.getElementById("pw-input").focus();
  }
}
if(sessionStorage.getItem("auth")==="ok"){
  document.addEventListener("DOMContentLoaded",function(){
    document.getElementById("pw-screen").style.display="none";
  });
}
</script>
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeMemo()">
  <div class="modal-box">
    <div class="modal-head">
      <span class="modal-head-title" id="modal-title">메모</span>
      <button class="modal-close" onclick="closeMemo()">✕</button>
    </div>
    <div class="modal-body" id="modal-history"></div>
    <div class="modal-foot">
      <input id="modal-inp" type="text" placeholder="메모 입력..."
        onkeydown="if(event.key==='Enter')document.getElementById('modal-save-btn').click()">
      <button id="modal-save-btn">저장</button>
    </div>
  </div>
</div>
<div class="topbar">
  <span class="ttl">월별 장부 입력</span>
  <div class="btab on" id="tb-dn" onclick="sw('dn')">두나빌</div>
  <div class="btab" id="tb-cw" onclick="sw('cw')">초원빌</div>
  <div class="tb-r">
    <button class="mb" onclick="cm(-1)">&#8249;</button>
    <span class="ml" id="ml"></span>
    <button class="mb" onclick="cm(1)">&#8250;</button>
    <button class="sv-btn" onclick="sn()">&#128190; 저장</button>
    <span class="si" id="si"></span>
  </div>
</div>

<!-- 내비 -->
<div style="background:var(--sf);border-bottom:1px solid var(--bd);padding:0 16px;display:flex;gap:6px;align-items:center;height:38px">
  <button class="pn-btn on" id="nav-main"       onclick="goMain()">📋 <span class="nav-txt">월별 장부</span></button>
  <button class="pn-btn"    id="nav-settle"      onclick="goSettle()">💸 <span class="nav-txt">월별 정산</span></button>
  <button class="pn-btn"    id="nav-payhistory"  onclick="goPayHistory()">🏠 <span class="nav-txt">납부 내역</span></button>
</div>

<!-- 메인 섹션 -->
<div id="sec-main">
  <div class="outer">
    <div class="sum-strip">
      <div><div class="sl">당월 입금</div><div id="s-inc">—</div></div>
      <div><div class="sl">당월 지출</div><div class="sv2" id="s-exp">—</div></div>
      <div><div class="sl">순이익</div><div class="sv2 g" id="s-net">—</div></div>
      <div><div class="sl">공실</div><div class="sv2" id="s-base" style="font-size:13px;color:var(--red)">—</div></div>
    </div>
    <div class="chart-section">
      <div class="chart-tabs">
        <div class="ctab" id="ctab-monthly" onclick="switchChartMode('monthly')">📈 월별 추이</div>
        <div class="ctab" id="ctab-yearly"  onclick="switchChartMode('yearly')">📊 연도별 요약</div>
      </div>
      <div class="chart-body">
        <div id="chart-pane-monthly" class="chart-pane"><canvas id="chart-monthly"></canvas></div>
        <div id="chart-pane-yearly" class="chart-pane" style="display:none"><canvas id="chart-yearly"></canvas></div>
      </div>
    </div>
    <div class="grid2"><div id="lp"></div><div id="rp"></div></div>
    <div class="room-section">
      <div class="room-section-title">🏠 호실별 비용 내역</div>
      <div id="room-cards"></div>
      <div id="room-detail"><div class="empty-msg">호실 카드를 클릭하면 상세 내역이 표시됩니다</div></div>
    </div>
  </div>
</div>

<!-- 정산 섹션 -->
<div id="sec-settle" style="display:none">
  <div class="settle-section">
    <div id="settle-content"></div>
  </div>
</div>

<!-- 납부내역 섹션 -->
<div id="sec-payhistory" style="display:none">
  <div style="padding:12px 14px 40px">
    <div id="ph-content"></div>
  </div>

var GS_URL="https://script.google.com/macros/s/AKfycbzBha75zYsi7bpYSJlgXa-GCwNYzO8HpqmPeS1zY1tphRHzngIk3LRFF9mLdutTZNjl/exec";
var _gsCache={pay:{},memo:{},settle:{},ro:{}};

function jsonp(url,callback){
  var cbName="_gs_cb_"+Date.now()+"_"+Math.floor(Math.random()*10000);
  var script=document.createElement("script");
  var timer=setTimeout(function(){
    window[cbName]=null;
    if(script.parentNode) script.parentNode.removeChild(script);
    callback(null);
  },10000);
  window[cbName]=function(data){
    clearTimeout(timer);
    window[cbName]=null;
    if(script.parentNode) script.parentNode.removeChild(script);
    callback(data);
  };
  script.src=url+(url.indexOf("?")>=0?"&":"?")+"callback="+cbName+"&t="+Date.now();
  document.body.appendChild(script);
}

function gsLoadAll(callback){
  jsonp(GS_URL+"?action=getAll",function(data){
    if(data){
      if(data.pay) _gsCache.pay=data.pay;
      if(data.memo) _gsCache.memo=data.memo;
      if(data.settle) _gsCache.settle=data.settle;
      if(data.ro) _gsCache.ro=data.ro;
    } else {
      console.warn("GS load 실패");
    }
    if(callback)callback();
  });
}

function gsSet(sheet,key,value){
  _gsCache[sheet]=_gsCache[sheet]||{};
  _gsCache[sheet][key]=JSON.stringify(value);
  var img=new Image();
  img.src=GS_URL+"?action=set&sheet="+encodeURIComponent(sheet)+"&key="+encodeURIComponent(key)+"&value="+encodeURIComponent(JSON.stringify(value))+"&t="+Date.now();
  img.onerror=function(){};
}

// ── Storage (Google Sheets 기반) ──────────────────
function stKey(b,y,m){return"lj-"+b+"-"+y+"-"+(m<10?"0"+m:m);}
function lsLoad(b,y,m){
  var key=stKey(b,y,m);
  try{var s=_gsCache.pay[key];return s?JSON.parse(s):{rooms:{},expenses:{}};}
  catch(e){return{rooms:{},expenses:{}};}
}
function lsSave(b,y,m,d){
  gsSet("pay",stKey(b,y,m),d);
}

// ── 납부 데이터 (localStorage 우선, 없으면 엑셀 DB) ──
function getPayData(b,y,m){
  var lbl=mLbl(y,m);
  var ls=lsLoad(b,y,m);
  var db=(b==="dn"?DN_PAY:CW_PAY)[lbl]||{};
  var result={};
  var rooms=b==="dn"?ROOMS_DN:getRooms();
  rooms.forEach(function(r){
    var lsR=ls.rooms&&ls.rooms[r.r];
    var dbR=db[r.r];
    if(lsR&&(lsR.pay_date||lsR.pay_amount!=null)) result[r.r]=lsR;
    else if(dbR) result[r.r]=dbR;
    else result[r.r]={pay_date:"",pay_amount:null,status:""};
  });
  return result;
}

// ── 메모: 글로벌(엑셀) + 월별(사용자) ─────────────────────────
// 글로벌 키: "gmemo-{b}-{tp}-{room}"
// 월별 키:   "mmemo-{b}-{tp}-{room}-{yyyy}-{mm}"
function gMemoKey(b,tp,room){return"gmemo-"+b+"-"+tp+"-"+room;}
function mMemoKey(b,tp,room,y,m){return"mmemo-"+b+"-"+tp+"-"+room+"-"+y+"-"+(m<10?"0"+m:m);}
function gMemoLoad(b,tp,room){
  var key=gMemoKey(b,tp,room);
  try{var s=_gsCache.memo[key];return s?JSON.parse(s):[];}catch(e){return[];}
}
function mMemoLoad(b,tp,room,y,m){
  var key=mMemoKey(b,tp,room,y,m);
  try{var s=_gsCache.memo[key];return s?JSON.parse(s):[];}catch(e){return[];}
}
function mMemoSave(b,tp,room,y,m,arr){
  gsSet("memo",mMemoKey(b,tp,room,y,m),arr);
}
function mMemoAdd(b,tp,room,y,m,txt){
  if(!txt.trim())return;
  var arr=mMemoLoad(b,tp,room,y,m);
  arr.unshift({dt:new Date().toLocaleDateString("ko-KR"),txt:txt.trim()});
  mMemoSave(b,tp,room,y,m,arr);
}

// initMemos: 사용자 메모 초기화만 (엑셀 메모는 openMemo에서 직접 렌더링)
function initMemos(b){
  // 모든 구버전 메모 키 청소 (gMemoKey, 구버전 memoKey(0,0) 등)
  var rooms=b==="dn"?ROOMS_DN:getRooms();
  rooms.forEach(function(r){
    try{localStorage.removeItem(gMemoKey(b,"deposit",r.r));}catch(e){}
    try{localStorage.removeItem(gMemoKey(b,"pay",r.r));}catch(e){}
  });
}

function getXlMemo(tp,room,my,mm){
  // 엑셀 메모에서 해당 월(my,mm)에 해당하는 것만 반환
  var db=B==="dn"?(tp==="deposit"?DN_DEP_MEMO:DN_PAY_MEMO):(tp==="deposit"?CW_DEP_MEMO:CW_PAY_MEMO);
  var items=db[room]||[];
  var lbl=mLbl(my,mm);
  return items.filter(function(it){return it.m===lbl;}).map(function(it){return it.t;});
}
function openMemo(tp,room,label,my,mm){
  var xlArr=getXlMemo(tp,room,my,mm);   // 해당 월 엑셀 코멘트

  document.getElementById("modal-history").innerHTML=rows.length?rows.join(""):"<div style='color:var(--t3);font-size:12px;padding:8px 0'>메모 없음</div>";
  var inp=document.getElementById("modal-inp");

// 납부일 포맷: "3-6" or "3/6" → "3/6", "6" → "6"
function normPayDate(s) {
  if (!s) return "";
  s = s.trim().replace(/[-_]/g, "/");
  // "3/6" 또는 "3/06" → 그대로, "6" → "6"
  return s;
}
function dispPayDate(s) {
  if (!s) return "";
  // "/" 포함하면 "M/D" 표시, 아니면 "n일"
  return s.indexOf("/") >= 0 ? s : s + "일";
}
function mLbl(y,m){return String(y).slice(2)+"."+m+"월";}
function addM(y,m,n){m+=n;while(m>12){m-=12;y++;}while(m<1){m+=12;y--;}return{y:y,m:m};}
function fmt(n){return n!=null?n.toLocaleString("ko-KR"):"—";}
function qh(s){return String(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function pn(s){var n=parseInt(String(s||"").replace(/,/g,""));return isNaN(n)?null:n;}

function makeChartOpts(labels,datasets){
  return{
    type:"bar",
    data:{labels:labels,datasets:datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:"index",intersect:false},
      plugins:{
        legend:{position:"top",labels:{font:{size:11},boxWidth:12,padding:10}},
        tooltip:{callbacks:{label:function(c){return c.dataset.label+": "+c.parsed.y.toLocaleString("ko-KR")+"원";}}},
        datalabels:{display:false}
      },
      scales:{
        x:{ticks:{font:{size:10},maxRotation:45},grid:{display:false}},
        y:{ticks:{font:{size:10},callback:function(v){return v>=10000?(v/10000).toFixed(0)+"만":v;}},
           grid:{color:"rgba(0,0,0,.04)"}}
      }
    }
  };
}

function getMonthlyData(){
  var labels=[],inc=[],exp=[],net=[];
  for(var i=11;i>=0;i--){
    var r=addM(Y,M,-i);var lbl=mLbl(r.y,r.m);
    labels.push(lbl);
    var payD=(B==="dn"?DN_PAY:CW_PAY)[lbl]||{};
    var incV=0;Object.keys(payD).forEach(function(rm){var pa=payD[rm].pay_amount;if(pa)incV+=pa;});
    // localStorage 납부 입력도 합산
    var lsPay=lsLoad(B,r.y,r.m);
    if(lsPay.rooms){Object.keys(lsPay.rooms).forEach(function(rm){var pa=lsPay.rooms[rm].pay_amount;if(pa&&!payD[rm])incV+=pa;});}
    var expArr=(B==="dn"?DN_EXP:CW_EXP)[lbl]||[];
    var expV=0;expArr.forEach(function(it){expV+=it.a;});
    inc.push(incV);exp.push(expV);net.push(incV-expV);
  }
  return{labels:labels,inc:inc,exp:exp,net:net};
}

function getYearlyData(){
  var payDB=B==="dn"?DN_PAY:CW_PAY;
  var expDB=B==="dn"?DN_EXP:CW_EXP;
  var ym={};
  Object.keys(payDB).forEach(function(lbl){
    var parts=lbl.replace("월","").split(".");
    var y2=parseInt(parts[0])<100?2000+parseInt(parts[0]):parseInt(parts[0]);
    var yk=String(y2);
    if(!ym[yk])ym[yk]={inc:0,exp:0};
    Object.keys(payDB[lbl]).forEach(function(rm){var pa=payDB[lbl][rm].pay_amount;if(pa)ym[yk].inc+=pa;});
  });
  Object.keys(expDB).forEach(function(lbl){
    var parts=lbl.replace("월","").split(".");
    var y2=parseInt(parts[0])<100?2000+parseInt(parts[0]):parseInt(parts[0]);
    var yk=String(y2);
    if(!ym[yk])ym[yk]={inc:0,exp:0};
    expDB[lbl].forEach(function(it){ym[yk].exp+=it.a;});
  });
  var years=Object.keys(ym).sort();
  var labels=[],inc=[],exp=[],net=[];
  years.forEach(function(yk){
    labels.push(yk+"년");
    inc.push(ym[yk].inc);exp.push(ym[yk].exp);net.push(ym[yk].inc-ym[yk].exp);
  });
  return{labels:labels,inc:inc,exp:exp,net:net};
}

var dataLabelsPlugin={
  id:"customLabels",
  afterDatasetDraw:function(chart,args){
    var ds=chart.data.datasets[args.index];
    if(!ds||!ds.datalabels||!ds.datalabels.display) return;
    var ctx=chart.ctx,meta=chart.getDatasetMeta(args.index);
    var cfg=ds.datalabels;
    ctx.save();
    ctx.font=(cfg.font&&cfg.font.weight==="bold"?"bold ":"")+((cfg.font&&cfg.font.size)||10)+"px -apple-system,sans-serif";
    ctx.fillStyle=cfg.color||"#333";
    ctx.textAlign="center";
    ctx.textBaseline="bottom";
    meta.data.forEach(function(bar,i){
      var val=ds.data[i];
      var txt=cfg.formatter?cfg.formatter(val,i):val;
      if(!txt)return;
      var x=bar.x,y=bar.y-4;
      ctx.fillText(txt,x,y);
    });
    ctx.restore();
  }
};
function renderOneChart(mode,canvasId,d){
  var canvas=document.getElementById(canvasId);if(!canvas)return;
  if(_charts[mode]){_charts[mode].destroy();_charts[mode]=null;}
  var opts=makeChartOpts(d.labels,buildDatasets(d));
  opts.plugins=[dataLabelsPlugin];
  _charts[mode]=new Chart(canvas.getContext("2d"),opts);
}

}

var _settleMode = "table";
var _selSettleM = null;




function isSettled(s) {
  var saved = settleLoad(s.m);
  if (saved && saved.paid_date && saved.paid_date.trim().length > 0) return true;
  var note = s.paid_note.replace("⑥ 입금일 :", "").trim();
  return note.length > 0;
}

function settleKey(m) { return "settle-dn-" + m; }
function settleLoad(m) {
  try { var s = _gsCache.settle[settleKey(m)]; return s ? JSON.parse(s) : null; } catch(e) { return null; }
}
function settleSave(m, obj) { gsSet("settle", settleKey(m), obj); }

function pn2(s) { var n = parseInt(String(s||"").replace(/,/g,"")); return isNaN(n) ? 0 : n; }

function calcSettle(m) {
  var lbl = m;
  var payD = (DN_PAY[lbl]) || {};
  var incV = 0;
  Object.keys(payD).forEach(function(rm) { if (payD[rm].pay_amount) incV += payD[rm].pay_amount; });
  var parts = lbl.replace("월","").split(".");
  var ry = parseInt(parts[0]) < 100 ? 2000 + parseInt(parts[0]) : parseInt(parts[0]);
  var rm2 = parseInt(parts[1]);
  var lsPay = lsLoad("dn", ry, rm2);
  if (lsPay.rooms) {
    Object.keys(lsPay.rooms).forEach(function(rm) {
      var pa = lsPay.rooms[rm].pay_amount;
      if (pa && !payD[rm]) incV += pa;
    });
  }
  var expArr = (DN_EXP[lbl]) || [];
  var expV = 0; expArr.forEach(function(it) { expV += it.a; });
  var profit = Math.round((incV - expV) / 2);
  return { inc: incV, exp: expV, profit: profit };
}

    var rowBg = isSelected ? "background:#eef4ff" : (!settled ? "background:#fff8f0" : "");

function buildSettleForm(s) {
  var saved = settleLoad(s.m) || {};
  var calc  = calcSettle(s.m);

  var carryover  = saved.carryover  !== undefined ? saved.carryover  : s.carryover;
  var deduct     = saved.deduct     !== undefined ? saved.deduct     : s.deduct;
  var profit     = saved.profit     !== undefined ? saved.profit     : (s.profit || calc.profit);
  var dad        = saved.dad        !== undefined ? saved.dad        : 200000;
  var settlement = carryover - deduct + profit - dad;
  var paidDate   = saved.paid_date  || "";
  var paidNote   = saved.paid_note  || "";

  var prevNote    = s.carryover_note.replace(/①.*?:/, "").trim();
  var deductNote  = s.deduct_note.replace(/②.*?:/, "").trim();

  var isPos = settlement >= 0;
  var fmtV  = function(v) { return v ? v.toLocaleString("ko-KR") : ""; };

    + "</div>";

  // 입력 필드들
  var fields = [
    { id:"si-profit", label:"③ 당월 수익 (50%)", val:fmtV(profit), note:"", color:"var(--blue)" },
    { id:"si-carry",  label:"① 전월 이월분",      val:fmtV(carryover), note:prevNote, color:"" },
    { id:"si-deduct", label:"② 전월 차감분",      val:fmtV(deduct),    note:deductNote, color:"var(--red)" },

  });

  // 결과

  h += "<span id='si-result' style='font-size:20px;font-weight:800;color:" + (isPos?"#0a6e42":"var(--red)") + "'>" + fmt(settlement) + "원</span>";
  h += "</div>";

  // 입금일 + 비고
  h += "<div style='margin-bottom:8px'>";
  h += "<div style='font-size:11px;font-weight:700;color:var(--t3);margin-bottom:3px'>⑥ 입금일</div>";
  h += "<input id='si-paid-date' type='text' value='" + qh(paidDate) + "'"

    + " style='width:100%;padding:6px 8px;border:1.5px solid var(--bd);border-radius:var(--rs);font-size:13px;font-family:inherit'>";
  h += "</div>";

  h += "<div style='margin-bottom:12px'>";
  h += "<div style='font-size:11px;font-weight:700;color:var(--t3);margin-bottom:3px'>비고</div>";
  h += "<input id='si-paid-note' type='text' value='" + qh(paidNote) + "'"
    + " placeholder='예: 규현 국민은행으로 이체'"
    + " style='width:100%;padding:6px 8px;border:1.5px solid var(--bd);border-radius:var(--rs);font-size:13px;font-family:inherit'>";
  h += "</div>";

  // 버튼
  h += "<div style='display:flex;gap:8px'>";
  h += "<button onclick='saveSettleEntry()' style='flex:1;padding:9px 0;background:#111;color:#fff;border:none;border-radius:var(--rs);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit'>💾 저장</button>";
  h += "<button onclick='clearSettleEntry()' style='padding:9px 14px;background:var(--s2);color:var(--t2);border:1px solid var(--bd);border-radius:var(--rs);font-size:12px;cursor:pointer;font-family:inherit'>초기화</button>";
  h += "</div>";

  h += "</div></div>";
  return h;
}

function updateSettleCalc() {
  var profit = pn2(document.getElementById("si-profit") && document.getElementById("si-profit").value);
  var carry  = pn2(document.getElementById("si-carry")  && document.getElementById("si-carry").value);
  var deduct = pn2(document.getElementById("si-deduct") && document.getElementById("si-deduct").value);
  var dad    = pn2(document.getElementById("si-dad")    && document.getElementById("si-dad").value) || 200000;
  var result = carry - deduct + profit - dad;
  var el = document.getElementById("si-result");
  if (!el) return;
  el.textContent = fmt(result) + "원";
  var isPos = result >= 0;
  el.style.color = isPos ? "#0a6e42" : "var(--red)";
  var parent = el.parentElement;
  if (parent) {
    parent.style.background   = isPos ? "#e8f5e9" : "#fdecea";
    parent.style.borderColor  = isPos ? "#0a6e42" : "var(--red)";
  }
}

function saveSettleEntry() {
  if (!_selSettleM) return;
  var profit = pn2(document.getElementById("si-profit").value);
  var carry  = pn2(document.getElementById("si-carry").value);
  var deduct = pn2(document.getElementById("si-deduct").value);
  var dad    = pn2(document.getElementById("si-dad").value) || 200000;
  var obj = {
    profit: profit, carryover: carry, deduct: deduct, dad: dad,
    settlement: carry - deduct + profit - dad,
    paid_date: (document.getElementById("si-paid-date").value||"").trim(),
    paid_note: (document.getElementById("si-paid-note").value||"").trim()
  };
  settleSave(_selSettleM, obj);
  // DN_SETTLEMENTS 반영
  DN_SETTLEMENTS.forEach(function(s) {
    if (s.m !== _selSettleM) return;
    s.profit=obj.profit; s.carryover=obj.carryover;
    s.deduct=obj.deduct; s.dad=obj.dad; s.settlement=obj.settlement;
    if (obj.paid_date) s.paid_note="⑥ 입금일 : "+obj.paid_date+" "+obj.paid_note;
  });
  // 저장 완료 후 선택 해제
  if (obj.paid_date) _selSettleM = null;
  renderSettle();
}

function clearSettleEntry() {
  if (!_selSettleM) return;
  delete _gsCache.settle[settleKey(_selSettleM)];
  renderSettle();
}

function buildSettleChart(data) {
  var canvas = document.getElementById("settle-chart");
  if (!canvas || typeof Chart === "undefined") return;
  // 정산값 있는 것만, 최근 24개월, 오래된 순
  var show = data.filter(function(s){
    var sv = settleLoad(s.m);
    var se = sv && sv.settlement !== undefined ? sv.settlement : s.settlement;
    return se !== 0;
  }).slice(0,24).reverse();

  var labels = show.map(function(s){ return s.m; });
  var vals   = show.map(function(s){
    var sv = settleLoad(s.m);
    return sv && sv.settlement !== undefined ? sv.settlement : s.settlement;
  });
  var colors = vals.map(function(v){ return v >= 0 ? "rgba(10,110,66,0.72)" : "rgba(192,48,26,0.72)"; });
  var borderColors = vals.map(function(v){ return v >= 0 ? "#0a6e42" : "#c0301a"; });

  // 커스텀 레이블 플러그인 (막대 위/아래 금액 표시)
  var labelPlugin = {
    id: "settleLbl",
    afterDatasetDraw: function(chart) {
      var ctx = chart.ctx, meta = chart.getDatasetMeta(0);
      ctx.save();
      ctx.font = "bold 12px -apple-system,sans-serif";
      ctx.textAlign = "center";
      meta.data.forEach(function(bar, i) {
        var v = vals[i];
        if (!v) return;
        var txt = Math.round(v/10000) + "만";
        ctx.fillStyle = v >= 0 ? "#0a6e42" : "#c0301a";
        ctx.textBaseline = v >= 0 ? "bottom" : "top";
        ctx.fillText(txt, bar.x, v >= 0 ? bar.y - 3 : bar.y + 3);
      });
      ctx.restore();
    }
  };

  new Chart(canvas.getContext("2d"), {
    type: "bar",
    plugins: [labelPlugin],
    data: {
      labels: labels,
      datasets: [{
        label: "당월정산",
        data: vals,
        backgroundColor: colors,
        borderColor: borderColors,
        borderWidth: 1.5,
        borderRadius: 4
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: function(c){ return "정산: " + c.parsed.y.toLocaleString("ko-KR") + "원"; } } }
      },
      scales: {
        x: { ticks: { font: { size: 10 }, maxRotation: 45 }, grid: { display: false } },
        y: {
          ticks: { font: { size: 10 }, callback: function(v){ return v>=10000?Math.round(v/10000)+"만":v+""; } },
          grid: { color: "rgba(0,0,0,.04)" }
        }
      },
      layout: { padding: { top: 22 } }
    }
  });
}

// ── 전체 납부 현황: 최근 5개월 × 전체 호실 ───────────────────────
function buildOverviewTable(b, rooms, contracts, payDB) {
  // 최근 5개월 계산
  var months = [];
  for (var i = 4; i >= 0; i--) {
    var r = addM(Y, M, -i);
    months.push({ y: r.y, m: r.m, lbl: mLbl(r.y, r.m) });
  }

  var h = "<div style='background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow-x:auto'>";
  h += "<table style='border-collapse:collapse;white-space:nowrap'>";

  // colgroup
  h += "<colgroup><col style='width:44px'><col style='width:80px'>";
  months.forEach(function() { h += "<col style='width:110px'>"; });
  h += "</colgroup>";

  // 헤더
  h += "<thead><tr style='background:#e6e4de'>"
    + "<th style='padding:7px 8px;font-size:11px;font-weight:800;border-bottom:2px solid var(--bd2);text-align:center'>호실</th>"
    + "<th style='padding:7px 8px;font-size:11px;font-weight:800;border-bottom:2px solid var(--bd2);text-align:left'>세입자</th>";
  months.forEach(function(mo, i) {
    var isCur = (i === months.length - 1);
    h += "<th style='padding:7px 10px;font-size:11px;font-weight:800;border-bottom:2px solid var(--bd2);"
      + "border-left:1px solid var(--bd2);text-align:center;"
      + (isCur ? "color:var(--blue)" : "color:var(--t2)") + "'>" + mo.lbl + "</th>";
  });
  h += "</tr></thead><tbody>";

  // 호실별 행
  var totals = months.map(function() { return 0; });
  var paidCounts = months.map(function() { return 0; });

  rooms.forEach(function(rRaw) {
    var r = getRoomInfo(b, rRaw.r) || rRaw;
    if (!r.t && !r.rent) return;
    var isEmpty = r.rent === 0;

    h += "<tr style='border-bottom:1px solid var(--bd)'>";
    h += "<td style='padding:6px 8px;font-size:13px;font-weight:700;text-align:center'>" + r.r + "</td>";
    h += "<td style='padding:4px 8px;font-size:12px;color:" + (isEmpty?"var(--t3)":"var(--tx)") + "'>"
      + (r.t||"공실")
      + (r.due ? "<br><span style='font-size:10px;color:var(--t3);font-weight:400'>" + r.due + "일 기준</span>" : "")
      + "</td>";

    months.forEach(function(mo, i) {
      var payD = payDB[mo.lbl] && payDB[mo.lbl][r.r];
      var lsPay = lsLoad(b, mo.y, mo.m);
      var lsR   = lsPay.rooms && lsPay.rooms[r.r];
      var final = (lsR && (lsR.pay_date || lsR.pay_amount != null)) ? lsR : (payD || null);

      var isCur = (i === months.length - 1);
      var bdrL  = "border-left:1px solid var(--bd2)";

      // 계약 시작 전 월 → "-" 표시
      var ct = contracts[r.r];
      var ctSk = ct ? ct.y * 100 + ct.m : 0;
      var moSk = mo.y * 100 + mo.m;

      if (isEmpty || !r.rent) {
        h += "<td style='padding:6px 10px;text-align:center;" + bdrL + "'><span style='color:var(--t3);font-size:11px'>—</span></td>";
        return;
      }

      // 계약 시작 전 월
      if (ct && moSk < ctSk) {
        h += "<td style='padding:6px 10px;text-align:center;background:#f5f5f2;" + bdrL + "'><span style='color:var(--bd2);font-size:13px'>—</span></td>";
        return;
      }

      if (!final || (final.pay_amount == null && !final.pay_date)) {
        // 기준일 미도래 체크
        var todayNow = new Date();
        var tY=todayNow.getFullYear(), tM=todayNow.getMonth()+1, tD=todayNow.getDate();
        if (mo.y===tY && mo.m===tM && r.due && tD < r.due) {
          h += "<td style='padding:6px 10px;text-align:center;" + bdrL + "'>"
            + "<span style='color:var(--t3);font-size:12px'>—</span></td>";
          return;
        }
        // 미납
        h += "<td style='padding:6px 10px;text-align:center;background:#fff5f5;" + bdrL + "'>"
          + "<span style='font-size:11px;font-weight:700;color:var(--red)'>미납</span></td>";
        return;
      }

      var pa = final.pay_amount;
      var pd = final.pay_date;
      var diff = pa != null ? (pa - r.rent) : null;
      var color = diff == null ? "var(--t2)" : diff >= 0 ? "var(--green)" : "var(--red)";
      var bg    = diff != null && diff < 0 ? "background:#fdecea;" : "";

      if (pa != null) { totals[i] += pa; paidCounts[i]++; }

      h += "<td style='padding:5px 10px;text-align:center;" + bg + bdrL + "'>";
      // 납부일
      if (pd) h += "<div style='font-size:10px;color:var(--t3);margin-bottom:1px'>" + dispPayDate(pd) + "</div>";
      // 납부액
      if (pa != null) {
        h += "<div style='font-size:12px;font-weight:700;color:" + color + "'>" + fmt(pa) + "</div>";
        if (diff !== 0 && diff != null) {
          h += "<div style='font-size:10px;color:" + color + "'>" + (diff > 0 ? "+" : "") + fmt(diff) + "</div>";
        }
      } else if (pd) {
        h += "<div style='font-size:11px;color:var(--t2)'>납부</div>";
      }
      h += "</td>";
    });

    h += "</tr>";
  });

  // 합계 행
  h += "<tfoot><tr style='background:#e6e4de;border-top:2px solid var(--bd2)'>"
    + "<td colspan='2' style='padding:6px 8px;font-size:11px;font-weight:800;text-align:center'>합계</td>";
  months.forEach(function(mo, i) {
    h += "<td style='padding:6px 10px;text-align:center;border-left:1px solid var(--bd2)'>"
      + "<div style='font-size:12px;font-weight:800;color:#111'>" + (totals[i] ? fmt(totals[i]) : "—") + "</div>"
      + "<div style='font-size:10px;color:var(--t3)'>" + paidCounts[i] + "호 납부</div>"
      + "</td>";
  });
  h += "</tr></tfoot></table></div>";
  return h;
}

function buildPayHistoryTable(b, room, rooms, contracts, payDB) {
  var rDef = getRoomInfo(b, room);
  if (!rDef) { rooms.forEach(function(r) { if (r.r === room) rDef = r; }); }
  if (!rDef) return "";

  var ct = contracts[room];
  var allMonths = getPayMonths(b, room, ct, payDB);

  if (allMonths.length === 0) {
    return "<div class='empty-msg' style='padding:32px'>납부 내역 없음</div>";
  }

  // 헤더
  var h = "<div style='background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;max-width:680px'>";

  // 호실 정보 헤더
  h += "<div style='padding:10px 14px;background:#e6e4de;border-bottom:2px solid var(--bd2);display:flex;align-items:center;gap:12px;flex-wrap:wrap'>";
  h += "<span style='font-size:17px;font-weight:800;color:#111'>" + room + "호</span>";
  h += "<span style='font-size:14px;font-weight:600;color:var(--t2)'>" + (rDef.t||"공실") + "</span>";
  if (rDef.rent) h += "<span style='font-size:12px;color:var(--t2)'>월세 " + fmt(rDef.rent) + "</span>";
  if (rDef.d) h += "<span style='font-size:12px;color:var(--t2)'>보증금 " + fmt(rDef.d) + "</span>";
  if (ct) h += "<span style='font-size:12px;color:var(--t3)'>계약 " + String(ct.y).slice(2) + "." + ct.m + "월~</span>";
  // 통계
  var stats = calcPayStats(allMonths, rDef);
  h += "<span style='margin-left:auto;font-size:11px;color:var(--t3)'>" + allMonths.length + "개월 · 납부 " + stats.paidCount + "회 · 미납 " + stats.unpaidCount + "회</span>";
  h += "<span style='font-size:12px;font-weight:700;color:var(--blue)'>총 " + fmt(stats.totalPaid) + "원</span>";
  h += "</div>";

  // 테이블
  h += "<table style='width:100%;max-width:680px;border-collapse:collapse'>";
  h += "<thead><tr style='background:#f0efeb'>"
    + "<th style='padding:6px 10px;font-size:11px;font-weight:800;text-align:center;border-bottom:1px solid var(--bd);width:72px'>월</th>"
    + "<th style='padding:6px 10px;font-size:11px;font-weight:800;text-align:center;border-bottom:1px solid var(--bd);width:60px'>납부일</th>"
    + "<th style='padding:6px 10px;font-size:11px;font-weight:800;text-align:right;border-bottom:1px solid var(--bd);width:100px'>납부액</th>"
    + "<th style='padding:6px 10px;font-size:11px;font-weight:800;text-align:right;border-bottom:1px solid var(--bd);width:100px'>기준월세</th>"
    + "<th style='padding:6px 10px;font-size:11px;font-weight:800;text-align:center;border-bottom:1px solid var(--bd);width:90px'>납부상태</th>"
    + "<th style='padding:6px 10px;font-size:11px;font-weight:800;text-align:right;border-bottom:1px solid var(--bd);width:90px'>차액</th>"
    + "</tr></thead><tbody>";

  var cumDiff = 0;
  allMonths.forEach(function(row, idx) {
    var isPaid  = row.pay_amount !== null && row.pay_amount !== undefined;
    var isUnpaid = !isPaid && rDef.rent > 0;
    var diff    = isPaid ? (row.pay_amount - rDef.rent) : null;
    if (diff !== null) cumDiff += diff;

    // 기준일 미도래 체크
    var today = new Date();
    var todayY2 = today.getFullYear(), todayM2 = today.getMonth()+1, todayD2 = today.getDate();
    var rowParts = row.m.replace("월","").split(".");
    var rowY = parseInt(rowParts[0])<100 ? 2000+parseInt(rowParts[0]) : parseInt(rowParts[0]);
    var rowM = parseInt(rowParts[1]);
    var isCurrentRow = (rowY === todayY2 && rowM === todayM2);
    var notDueYet = isCurrentRow && rDef.due && todayD2 < rDef.due;

    var stColor = "", stBg = "", stTxt = "";
    if (rDef.rent === 0) { stTxt = "—"; stColor = "var(--t3)"; }
    else if (!isPaid && notDueYet) { stTxt = "—"; stColor = "var(--t3)"; stBg = ""; }
    else if (!isPaid) { stTxt = "미납"; stColor = "var(--red)"; stBg = "#fdecea"; }
    else if (diff >= 0) { stTxt = "납부" + (diff > 0 ? " +" + fmt(diff) : ""); stColor = "var(--green)"; stBg = ""; }
    else { stTxt = fmt(diff); stColor = "var(--red)"; stBg = "#fdecea"; }

    // 상태 배경 (기준일 미도래는 일반 배경)
    var rowBg = (isUnpaid && !notDueYet) ? "background:#fff5f5" : (idx % 2 === 1 ? "background:#fafaf8" : "");

    h += "<tr style='" + rowBg + ";border-bottom:1px solid var(--bd)'>";
    h += "<td style='padding:5px 10px;font-size:12px;font-weight:600;text-align:center'>" + row.m + "</td>";
    h += "<td style='padding:5px 10px;font-size:12px;text-align:center;color:" + (row.pay_date?"#111":"var(--t3)") + "'>" + (row.pay_date ? dispPayDate(row.pay_date) : "—") + "</td>";
    h += "<td style='padding:5px 10px;font-size:12px;text-align:right;font-weight:" + (isPaid?"600":"400") + ";color:" + (isPaid?"#111":"var(--t3)") + "'>" + (isPaid ? fmt(row.pay_amount) : "—") + "</td>";
    h += "<td style='padding:5px 10px;font-size:12px;text-align:right;color:var(--t3)'>" + (rDef.rent ? fmt(rDef.rent) : "—") + "</td>";
    h += "<td style='padding:5px 10px;text-align:center'><span style='font-size:11px;font-weight:600;color:" + stColor + ";background:" + stBg + ";padding:1px 6px;border-radius:3px'>" + stTxt + "</span></td>";
    h += "<td style='padding:5px 10px;font-size:12px;text-align:right;color:" + (diff===null?"var(--t3)":diff>=0?"var(--green)":"var(--red)") + ";font-weight:" + (diff!==null&&diff!==0?"600":"400") + "'>"
      + (diff !== null ? (diff >= 0 ? "+" : "") + fmt(diff) : "—") + "</td>";
    h += "</tr>";
  });

  // 합계 행
  h += "<tfoot><tr style='background:#e6e4de;border-top:2px solid var(--bd2)'>"
    + "<td colspan='2' style='padding:6px 10px;font-size:12px;font-weight:800;text-align:center'>합계</td>"
    + "<td style='padding:6px 10px;font-size:13px;font-weight:800;text-align:right'>" + fmt(stats.totalPaid) + "</td>"
    + "<td style='padding:6px 10px;font-size:12px;text-align:right;color:var(--t3)'>" + fmt(rDef.rent * allMonths.length) + "</td>"
    + "<td></td>"
    + "<td style='padding:6px 10px;font-size:13px;font-weight:800;text-align:right;color:" + (cumDiff>=0?"var(--green)":"var(--red)") + "'>"
    + (cumDiff >= 0 ? "+" : "") + fmt(cumDiff) + "</td>"
    + "</tr></tfoot>";

  h += "</table></div>";
  return h;
}

function getPayMonths(b, room, ct, payDB) {
  // 계약 시작월부터 현재까지 모든 월
  if (!ct) return [];
  var sy = ct.y, sm = ct.m;
  var ey = new Date().getFullYear(), em = new Date().getMonth() + 1;
  var rows = [];
  var cy = sy, cm2 = sm;
  while (cy < ey || (cy === ey && cm2 <= em)) {
    var lbl = mLbl(cy, cm2);
    var payData = payDB[lbl] && payDB[lbl][room];
    // localStorage도 확인
    var lsData = lsLoad(b, cy, cm2);
    var lsPay  = lsData.rooms && lsData.rooms[room];
    var finalPay = (lsPay && (lsPay.pay_date || lsPay.pay_amount != null)) ? lsPay
                 : (payData || { pay_date: "", pay_amount: null, status: "" });
    rows.push({
      m: lbl,
      pay_date:   finalPay.pay_date   || "",
      pay_amount: finalPay.pay_amount || null,
      status:     finalPay.status     || ""
    });
    cm2++;
    if (cm2 > 12) { cm2 = 1; cy++; }
  }
  return rows.reverse(); // 최신순
}

function calcPayStats(rows, rDef) {
  var paidCount = 0, unpaidCount = 0, totalPaid = 0;
  rows.forEach(function(r) {
    if (r.pay_amount !== null && r.pay_amount !== undefined) {
      paidCount++;
      totalPaid += r.pay_amount;
    } else if (rDef.rent > 0) {
      unpaidCount++;
    }
  });
  return { paidCount: paidCount, unpaidCount: unpaidCount, totalPaid: totalPaid };
}








function onReNameInput(el){
  var isVacant=el.value.trim()==="공실";
  var fields=document.getElementById("re-fields");
  if(!fields)return;
  if(isVacant){
    fields.style.opacity="0.35";
    fields.style.pointerEvents="none";
    var dEl=document.getElementById("re-d");
    var rentEl=document.getElementById("re-rent");
    var dueEl=document.getElementById("re-due");
    if(dEl)dEl.value="";
    if(rentEl)rentEl.value="";
    if(dueEl)dueEl.value="";
  } else {
    fields.style.opacity="1";
    fields.style.pointerEvents="auto";
  }
}
function reNumFmt(el){el.value=el.value.replace(/[^0-9,]/g,"");}
function reNumOnly(el){el.value=el.value.replace(/[^0-9]/g,"");}
// ── 호실 정보 override (보증금/월세/기준일 수동 수정) ─────────
function roKey(b,r){return"room-ov-"+b+"-"+r;}
function roLoad(b,r){
  try{var s=_gsCache.ro[roKey(b,r)];return s?JSON.parse(s):null;}catch(e){return null;}
}
function roSave(b,r,obj){ gsSet("ro",roKey(b,r),obj); }

// 원본 + override 합산 반환
function getRoomInfo(b,r){
  var base=null;
  if(b==="dn"){ROOMS_DN.forEach(function(x){if(x.r===r)base=Object.assign({},x);});}
  else{var rooms=getRooms();rooms.forEach(function(x){if(x.r===r)base=Object.assign({},x);});}
  if(!base)return null;
  var ov=roLoad(b,r);
  if(ov){
    if(ov){
    if(ov.t    !==undefined)base.t   =ov.t;
    if(ov.d    !==undefined)base.d   =ov.d;
    if(ov.rent !==undefined)base.rent=ov.rent;
    if(ov.due  !==undefined)base.due =ov.due;
  }
  return base;
}

  pop.innerHTML="<div style='padding:10px 14px;background:#e6e4de;border-bottom:2px solid var(--bd2);display:flex;justify-content:space-between;align-items:center'>"
<span style='font-size:13px;font-weight:800'>"+room+"호 정보 수정</span>"
    +"<button onclick='closeRoomEdit()' style='border:none;background:none;font-size:16px;cursor:pointer;color:var(--t3);padding:0'>✕</button>"
    +"</div>"
    +"<div style='padding:12px 14px;display:flex;flex-direction:column;gap:10px'>"
    +"<div><div style='font-size:11px;font-weight:700;color:var(--t3);margin-bottom:3px'>세입자명 (공실 입력 시 자동처리)</div>"

    +" style='width:100%;padding:5px 8px;border:1.5px solid var(--bd);border-radius:var(--rs);font-size:14px;font-family:inherit;text-align:right'"
    +" oninput='reNumFmt(this)' placeholder='0'></div>"

function outsideRoomEdit(e){
  var pop=document.getElementById("room-edit-pop");
  if(pop&&!pop.contains(e.target)){closeRoomEdit();}
}
function closeRoomEdit(){
  var pop=document.getElementById("room-edit-pop");
  if(pop)pop.style.display="none";
  document.removeEventListener("mousedown",outsideRoomEdit);
}
var _reB=null,_reRoom=null;
function saveRoomEdit(){
  if(!_reB||!_reRoom){alert("오류: 빌딩/호실 정보가 없습니다. 다시 시도해주세요.");return;}
  var tEl  =document.getElementById("re-t");
  var dEl  =document.getElementById("re-d");
  var rentEl=document.getElementById("re-rent");
  var dueEl =document.getElementById("re-due");
  if(!tEl||!dEl||!rentEl||!dueEl){alert("오류: 입력 필드를 찾을 수 없습니다.");return;}
  var t   =(tEl.value||"").trim();
  var isVacant=t==="공실"||t==="";
  var d   =isVacant?0:parseInt((dEl.value||"").replace(/,/g,""))||0;
  var rent=isVacant?0:parseInt((rentEl.value||"").replace(/,/g,""))||0;
  var due =isVacant?null:(parseInt(dueEl.value||"")||null);
  var obj={t:isVacant?"":t, d:d, rent:rent, due:due};
  gsSet("ro",roKey(_reB,_reRoom),obj);
  closeRoomEdit();
  render();
}
}
function resetRoomEdit(){
  if(!_reB||!_reRoom)return;
  delete _gsCache.ro[roKey(_reB,_reRoom)];
  closeRoomEdit();
  render();
}
